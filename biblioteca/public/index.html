<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Iniciar sesión en BiblioGestion - Sistema Web de Gestión de Biblioteca">
    <title>Iniciar Sesión - BiblioGestion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            

            <!-- Título -->
            <h1>Bienvenido</h1>
            <p class="auth-subtitle">Inicia sesión en BiblioGestion</p>

            <!-- Mensaje de error/éxito -->
            <div id="authMessage" class="auth-message"></div>

            <!-- Formulario -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        placeholder="tu@correo.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button type="submit" id="btnLogin" class="btn btn-primary btn-block btn-lg">
                    Iniciar Sesión
                </button>
            </form>

            <!-- Link de registro -->
            <div class="auth-link">
                ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
            </div>
        </div>

        <div class="auth-footer">
            <p>© 2026 BiblioGestion — Sistema de Gestión de Biblioteca</p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/app.js"></script>
</body>
</html>
