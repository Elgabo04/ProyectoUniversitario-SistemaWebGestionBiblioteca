<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mis préstamos de libros - BiblioGestion">
    <title>Mis Préstamos - BiblioGestion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a class="navbar-brand" href="libros.html">
                <span class="navbar-brand-icon">B</span>
                BiblioGestion
            </a>
            
            <div class="navbar-nav">
                <a href="libros.html" class="nav-link">📚 Catálogo</a>
                <a href="prestamos.html" class="nav-link active">📋 Mis Préstamos</a>
            </div>

            <div class="navbar-right">
                <div class="navbar-user">
                    <span class="navbar-user-avatar" id="userAvatar"></span>
                    <span id="userName"></span>
                </div>
                <button class="btn btn-danger btn-sm" id="btnLogout">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <div class="container page-wrapper">
        <div class="page-header">
            <h1>📋 Mis Préstamos</h1>
            <p>Historial de tus préstamos y su estado actual</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="prestamosStats">
            <!-- Se llena dinámicamente -->
        </div>

        <!-- Tabla de Préstamos -->
        <div class="table-card">
            <div class="table-card-header">
                <h3>Historial de Préstamos</h3>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Libro</th>
                            <th>Fecha Préstamo</th>
                            <th>Fecha Devolución</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaMisPrestamos">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 BiblioGestion — Sistema de Gestión de Biblioteca</p>
    </footer>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/app.js"></script>
</body>
</html>
