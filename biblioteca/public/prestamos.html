<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Préstamos - BiblioGestion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <h1>Mis Préstamos</h1>

    <!-- Formulario para registrar un nuevo prestamo -->
    <section>
        <h2>Nuevo préstamo</h2>
        <form id="formPrestamo">
            <label>Usuario:
                <select id="usuarioSelect" required>
                    <option value="">Cargando usuarios...</option>
                </select>
            </label>
            <br>
            <label>Libro:
                <select id="libroSelect" required>
                    <option value="">Cargar libros...</option>
                </select>
            </label>
            <br>
            <label>Fecha devolución (opcional):
                <input type="date" id="fechaDevolucion">
            </label>
            <br>
            <button type="submit">Registrar préstamo</button>
        </form>
    </section>

    <hr>

    <!-- Tabla interactiva de prestamos -->
    <table border="1">
        <thead>
            <tr>
                <th>Código</th>
                <th>Usuario ID</th>
                <th>Libro ID</th>
                <th>Fecha Préstamo</th>
                <th>Fecha Devolución</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaPrestamos">

        </tbody>
    </table>

    <!-- Contenido Principal -->
    <div class="container" style="margin-top: 2rem; margin-bottom: 2rem;">
        <!-- Header -->
        <h2>Mis Préstamos</h2>

        <!-- Tabla de Préstamos -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Usuario ID</th>
                        <th>Libro ID</th>
                        <th>Fecha Préstamo</th>
                        <th>Fecha Devolución</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaPrestamos">
                </tbody>
            </table>
        </div>

    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Sistema de Gestión de Biblioteca.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
