<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - BiblioGestion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="card-container">
        <div class="card">
            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon">B</div>
            </div>

            <!-- Título -->
            <h1>Crear cuenta</h1>

            <!-- Formulario -->
            <form id="registerForm">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        name="nombre"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-success w-100 btn-large">
                    Registrarse
                </button>
            </form>

            <!-- Link de login -->
            <div class="link">
                
                <a href="login.html">Inicia sesión</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Sistema de Gestión de Biblioteca.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
