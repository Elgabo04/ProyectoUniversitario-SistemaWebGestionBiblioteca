<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crear una cuenta en BiblioGestion - Sistema Web de Gestión de Biblioteca">
    <title>Registro - BiblioGestion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo-icon">B</div>
            </div>

            <!-- Título -->
            <h1>Crear Cuenta</h1>
            <p class="auth-subtitle">Regístrate para acceder al catálogo</p>

            <!-- Mensaje de error/éxito -->
            <div id="authMessage" class="auth-message"></div>

            <!-- Formulario -->
            <form id="registerForm">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        name="nombre"
                        placeholder="Tu nombre completo"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        placeholder="tu@correo.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="Mínimo 6 caracteres"
                        minlength="6"
                        required
                    >
                </div>

                <button type="submit" id="btnRegister" class="btn btn-primary btn-block btn-lg">
                    Crear Cuenta
                </button>
            </form>

            <!-- Link de login -->
            <div class="auth-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </div>

        <div class="auth-footer">
            <p>© 2026 BiblioGestion — Sistema de Gestión de Biblioteca</p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/app.js"></script>
</body>
</html>
